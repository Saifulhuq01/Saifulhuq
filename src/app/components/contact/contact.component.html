<section class="px-6 md:px-20 py-16 bg-white dark:bg-gray-900">
  <h2 class="text-3xl font-bold mb-4 text-center text-gray-900 dark:text-white">Get in Touch</h2>
  <p class="text-lg mb-6 text-gray-700 dark:text-gray-300 text-center">Have a question or want to work together? Drop a message below!</p>
  <form (ngSubmit)="onSubmit()" #contactForm="ngForm" class="space-y-4 max-w-xl mx-auto">
    <input
      type="text"
      name="name"
      ngModel
      required
      placeholder="Your Name"
      class="w-full p-3 border rounded dark:bg-gray-800 dark:text-white"
    />
    <input
      type="email"
      name="email"
      ngModel
      required
      placeholder="Your Email"
      class="w-full p-3 border rounded dark:bg-gray-800 dark:text-white"
    />
    <textarea
      name="message"
      ngModel
      required
      placeholder="Your Message"
      rows="4"
      class="w-full p-3 border rounded dark:bg-gray-800 dark:text-white"
    ></textarea>
    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">Send Message</button>
  </form>
</section>

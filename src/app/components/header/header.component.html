<header class="flex justify-between items-center p-4 shadow-md sticky top-0 bg-white dark:bg-gray-900 z-50 text-gray-900 dark:text-white">
  <div class="text-xl font-bold">Mohammed Saifulhuq</div>

  <!-- Toggle Switch -->
  <button
    (click)="toggleTheme()"
    aria-label="Toggle theme"
    class="relative w-14 h-8 bg-gray-300 dark:bg-gray-700 rounded-full p-1 flex items-center transition-all duration-300"
  >
    <!-- Circle Toggle -->
    <div
      class="absolute left-1 top-1 w-6 h-6 bg-white rounded-full shadow-md transform transition-transform duration-300 dark:translate-x-6"
    ></div>

    <!-- Icons (Moon/Sun) -->
    <div class="absolute left-1 text-yellow-500 dark:hidden text-lg">🌙</div>
    <div class="absolute right-1 hidden dark:inline text-orange-400 text-lg">☀️</div>
  </button>
</header>

<section class="flex flex-col-reverse md:flex-row items-center justify-between px-6 md:px-20 py-24 gap-10 bg-white dark:bg-gray-900 text-gray-900 dark:text-white">
  
  <!-- Text Left -->
  <div class="md:w-1/2 text-center md:text-left">
    <h1 class="text-4xl md:text-6xl font-extrabold leading-tight">
      Code. Build. <span class="text-blue-600 dark:text-blue-400">Repeat.</span>
    </h1>
    <p class="text-xl mt-6 text-gray-700 dark:text-gray-300">
      Transforming coffee into clean code. <span class="inline-block">☕</span>
    </p>
    <p class="text-md italic mt-2 text-gray-600 dark:text-gray-400">
      I write code that speaks. <span class="not-italic font-medium">Literally.</span>
    </p>
  </div>

  <!-- Image Right with Refined Gradient Glow -->
  <div class="md:w-1/2 flex justify-center relative">
    <!-- Gradient Shadow Background -->
    <div class="absolute w-[280px] h-[280px] md:w-[320px] md:h-[320px] rounded-full blur-2xl z-0 
                bg-gradient-to-br from-blue-600 via-blue-700 to-blue-900 
                dark:from-blue-700 dark:via-blue-800 dark:to-blue-950 
                opacity-40 translate-y-4">
    </div>

    <!-- Profile Image -->
    <img src="assets/images/pro1.png"
         alt="Mohammed Saifulhuq"
         class="w-[260px] md:w-[300px] h-auto drop-shadow-2xl relative z-10 rounded-full" />
  </div>

</section>
